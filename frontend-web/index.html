<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project1 - Video Aggregator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">PROJECT<span>1</span></div>
        <div class="search-box">
            <input type="text" placeholder="Tìm video YouTube, TikTok...">
            <button id="search-btn">Tìm kiếm</button>
        </div>

        <div class="user-profile">
            <button id="login-toggle-btn" onclick="showLoginModal()">Đăng nhập</button>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <nav>
                <a href="#" class="nav-item active">Trang chủ</a>
                <a href="#" class="nav-item">YouTube</a>
                <a href="#" class="nav-item">TikTok</a>
                <hr>
                <a href="#" class="nav-item">Video đã lưu</a>
            </nav>
        </aside>

        <section class="content-area">
            <div class="video-grid" id="video-container">
                <div class="video-card">
                    <div class="thumb-wrapper">
                        <img src="https://picsum.photos/300/170" alt="Video">
                        <span class="badge youtube">YouTube</span>
                    </div>
                    <div class="video-meta">
                        <h3>Tiêu đề video mẫu cực hay</h3>
                        <p>Tên kênh • 10k lượt xem</p>
                    </div>
                </div>
                </div>
        </section>
    </div>
    
    <div id="videoModal" class="modal">
        <div class="modal-content">
         <span class="close-btn">&times;</span>
            <div id="player-container">
             </div>
        </div>
    </div>    
    <script src="script.js"></script>
<div id="authModal" class="modal">
    <div class="modal-content" style="max-width: 400px; padding: 20px;">
        <span class="close-btn" onclick="closeAuthModal()">&times;</span>
        <h2 style="color: white; text-align: center;">Đăng nhập hệ thống</h2>
        <div class="admin-panel" style="margin-top: 0;">
            <input type="text" id="login-username" placeholder="Tên đăng nhập" name="username">
            <input type="password" id="login-password" placeholder="Mật khẩu" name="password">
            <button onclick="handleLogin()">Xác nhận Đăng nhập</button>
        </div>
    </div>
</div>
</body>
</html>
